<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ポーズ図形あて - 姿勢制限版</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: white; 
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; 
            overflow: hidden; 
            position: fixed; 
            width: 100%; 
            height: 100%; 
            transition: background-color 0.5s ease; 
        }
        canvas { position: absolute; left: 0; top: 0; width: 100vw; height: 100vh; }
        video { display: none; }
        
        #ui-layer { 
            position: absolute; width: 100%; height: 100%; 
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            pointer-events: none; z-index: 10; 
        }

        .hud-container { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 20; }
        .hud-item { font-size: 6vw; font-weight: bold; text-shadow: 2px 2px 4px #000; color: #0f0; }

        .column { display: flex; flex-direction: column; justify-content: space-around; align-items: center; height: 100%; }
        
        #question-area { 
            writing-mode: vertical-rl; text-orientation: upright;
            font-size: 12vw; font-weight: bold; color: #fff;
            background: rgba(255,255,255,0.1); padding: 20px 10px; border-radius: 15px;
            max-height: 70vh; margin-top: 10vh;
        }

        #msg { 
            position: absolute; bottom: 8%; width: 100%; text-align: center;
            font-size: 8vw; color: #0ff; text-shadow: 2px 2px 4px #000; font-weight: bold; 
        }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; text-align: center;
        }
        #startButton {
            padding: 15px 40px; font-size: 24px; font-weight: bold; border-radius: 50px;
            border: none; background: #2ecc71; color: white; cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>

    <video id="input_video" playsinline></video>
    <canvas id="output_canvas"></canvas>

    <div class="hud-container">
        <div class="hud-item">Score: <span id="score">0</span></div>
        <div class="hud-item" style="color:#fff">Time: <span id="timer">60</span></div>
    </div>

    <div id="ui-layer">
        <div class="column"></div>
        <div class="column"><div id="question-area"></div></div>
        <div class="column"></div>
    </div>

    <div id="msg"></div>

    <div id="overlay">
        <h1 style="color:#ff0; font-size: 10vw;">図形あてゲーム</h1>
        <p style="font-size: 4.5vw;">画面中央に立って、背景が灰色になったら開始！<br>正解の図形を指さして0.3秒まとう！<br>※肘を下げて、手を高くあげてね</p>
        <button id="startButton">ゲームをはじめる</button>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const questionEl = document.getElementById('question-area');
        const msgEl = document.getElementById('msg');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('startButton');

        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playSound(freq, type = 'sine', duration = 0.15) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.stop(audioCtx.currentTime + duration);
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const uttr = new SpeechSynthesisUtterance(text);
            uttr.lang = 'ja-JP';
            window.speechSynthesis.speak(uttr);
        }

        const comboList = [
            { label: "あおまる", colorCode: "#0088ff", shapeType: "まる" },
            { label: "あおさんかく", colorCode: "#0088ff", shapeType: "さんかく" },
            { label: "あおしかく", colorCode: "#0088ff", shapeType: "しかく" },
            { label: "あかまる", colorCode: "#ff0000", shapeType: "まる" },
            { label: "あかさんかく", colorCode: "#ff0000", shapeType: "さんかく" },
            { label: "あかしかく", colorCode: "#ff0000", shapeType: "しかく" }
        ];

        let score = 0, timeLeft = 60, gameActive = false;
        let targets = [], currentAnswer = null, isProcessingNext = false;
        let isCooldown = false, circleRadius = 0;

        let lastSelectedTarget = null;
        let dwellStartTime = 0;
        const DWELL_DURATION = 300; 

        function updateCanvasSize() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
            circleRadius = canvasElement.width * 0.12;
        }
        window.addEventListener('resize', updateCanvasSize);
        updateCanvasSize();

        function drawTargetShape(ctx, target, isHovered, progress) {
            const { x, y, data } = target;
            const size = circleRadius;
            ctx.save();
            ctx.fillStyle = data.colorCode;
            ctx.beginPath();
            if (data.shapeType === "まる") {
                ctx.arc(x, y, size, 0, Math.PI * 2);
            } else if (data.shapeType === "しかく") {
                ctx.rect(x - size, y - size, size * 2, size * 2);
            } else if (data.shapeType === "さんかく") {
                ctx.moveTo(x, y - size);
                ctx.lineTo(x - size, y + size);
                ctx.lineTo(x + size, y + size);
                ctx.closePath();
            }
            ctx.fill();

            ctx.strokeStyle = isHovered ? "#fff" : "rgba(255,255,255,0.4)";
            ctx.lineWidth = isHovered ? 10 : 4;
            ctx.stroke();

            if (isHovered && progress < 1.0) {
                ctx.beginPath();
                ctx.strokeStyle = "#0ff";
                ctx.lineWidth = 12;
                ctx.arc(x, y, size + 15, -Math.PI/2, (-Math.PI/2) + (Math.PI * 2 * progress));
                ctx.stroke();
            }
            ctx.restore();
        }

        function generateTargets() {
            targets = [];
            const shuffled = [...comboList].sort(() => Math.random() - 0.5);
            const W = canvasElement.width;
            const H = canvasElement.height;
            const positions = [
                { col: 0, row: 0 }, { col: 0, row: 1 }, { col: 0, row: 2 },
                { col: 2, row: 0 }, { col: 2, row: 1 }, { col: 2, row: 2 }
            ];
            positions.forEach((p, i) => {
                targets.push({
                    x: (W / 3) * p.col + (W / 6),
                    y: (H / 3) * p.row + (H / 6),
                    col: p.col, row: p.row,
                    data: shuffled[i]
                });
            });
        }

        function nextRound() {
            isProcessingNext = false;
            lastSelectedTarget = null;
            dwellStartTime = 0;
            msgEl.innerText = "";
            currentAnswer = comboList[Math.floor(Math.random() * comboList.length)];
            questionEl.innerText = currentAnswer.label;
            generateTargets();
            speak(currentAnswer.label);
        }

        function startGame() {
            if (gameActive || isCooldown) return;
            score = 0; timeLeft = 60;
            scoreEl.innerText = score;
            gameActive = true;
            playSound(660, 'sine', 0.2);
            nextRound();
            
            const timerInterval = setInterval(() => {
                if (!gameActive) { clearInterval(timerInterval); return; }
                timeLeft--;
                timerEl.innerText = timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);
        }

        function endGame() {
            gameActive = false;
            questionEl.innerText = "";
            msgEl.innerText = "終了！ スコア: " + score;
            document.body.style.backgroundColor = "#000"; 
            speak(`${score}点です。終了。`);
            isCooldown = true;
            setTimeout(() => {
                isCooldown = false;
                if (!gameActive) msgEl.innerText = "中央に立ってスタート";
            }, 3000);
        }

        function onResults(results) {
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            if (results.poseLandmarks) {
                const nose = results.poseLandmarks[0];
                const leftElbow = results.poseLandmarks[13];
                const rightElbow = results.poseLandmarks[14];
                const leftPoint = results.poseLandmarks[19]; // 左手先
                const rightPoint = results.poseLandmarks[20]; // 右手先

                // 背景色判定
                if (nose && nose.visibility > 0.5) {
                    if (nose.x > 0.45 && nose.x < 0.55) {
                        document.body.style.backgroundColor = "#555";
                    } else {
                        document.body.style.backgroundColor = "#000";
                    }
                }

                let activePoints = [];
                // 左手の判定（肘が手先より高い位置＝Y値が大きい場合は無視）
                if (leftPoint && leftPoint.visibility > 0.5 && leftElbow && leftElbow.visibility > 0.5) {
                    if (leftElbow.y > leftPoint.y) {
                        const sx = (1 - leftPoint.x);
                        activePoints.push({screenX: sx, screenY: leftPoint.y});
                    }
                }
                // 右手の判定
                if (rightPoint && rightPoint.visibility > 0.5 && rightElbow && rightElbow.visibility > 0.5) {
                    if (rightElbow.y > rightPoint.y) {
                        const sx = (1 - rightPoint.x);
                        activePoints.push({screenX: sx, screenY: rightPoint.y});
                    }
                }

                // スタート判定（両手が高い位置にある状態で、X座標の差が小さい＝合掌に近い状態）
                if (!gameActive && !isCooldown && activePoints.length === 2) {
                    const dist = Math.abs(activePoints[0].screenX - activePoints[1].screenX);
                    if (dist < 0.15) startGame();
                }

                let currentHoverTarget = null;
                if (gameActive && !isProcessingNext && nose) {
                    activePoints.forEach(pt => {
                        let c = pt.screenX < 0.33 ? 0 : (pt.screenX > 0.66 ? 2 : -1);
                        const threshold = 0.12; 
                        let r = -1;
                        if (pt.screenY < nose.y - threshold) r = 0;      
                        else if (pt.screenY > nose.y + threshold) r = 2; 
                        else r = 1;                                         

                        if (c !== -1 && r !== -1) {
                            currentHoverTarget = targets.find(t => t.col === c && t.row === r);
                        }
                    });

                    if (currentHoverTarget) {
                        if (lastSelectedTarget === currentHoverTarget) {
                            let elapsed = Date.now() - dwellStartTime;
                            let progress = Math.min(elapsed / DWELL_DURATION, 1.0);
                            
                            if (progress >= 1.0 && currentHoverTarget.data.label === currentAnswer.label) {
                                isProcessingNext = true;
                                score++;
                                scoreEl.innerText = score;
                                playSound(880, 'sine', 0.15);
                                msgEl.innerText = "せいかい！";
                                speak("正解");
                                setTimeout(nextRound, 800);
                            }
                        } else {
                            lastSelectedTarget = currentHoverTarget;
                            dwellStartTime = Date.now();
                        }
                    } else {
                        lastSelectedTarget = null;
                        dwellStartTime = 0;
                    }
                }

                if (gameActive) {
                    targets.forEach(t => {
                        const isHovered = (lastSelectedTarget === t);
                        const progress = isHovered ? (Date.now() - dwellStartTime) / DWELL_DURATION : 0;
                        drawTargetShape(canvasCtx, t, isHovered, progress);
                    });
                }
            }
        }

        const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        pose.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await pose.send({image: videoElement}); },
            width: 720, height: 1280,
            facingMode: 'user'
        });

        startBtn.addEventListener('click', () => {
            initAudio();
            overlay.style.display = 'none';
            msgEl.innerText = "カメラ準備中...";
            camera.start().then(() => {
                msgEl.innerText = "中央に立ってください";
            });
        });
    </script>
</body>
</html>
